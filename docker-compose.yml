services:
  postgres:
    image: postgres:16-alpine
    container_name: resume_builder_postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: resume_builder
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_password
    volumes:
      - resume_builder_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resume_builder"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  resume_builder_pg_data: